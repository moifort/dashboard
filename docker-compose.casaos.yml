name: linky-dashboard

services:
  linky-dashboard:
    image: ghcr.io/moifort/dashboard:main
    container_name: linky-dashboard
    restart: unless-stopped
    pull_policy: always
    logging:
      driver: json-file
      options:
        max-size: 1m
    ports:
      - target: 5000
        published: "5000"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/linky-dashboard
        target: /data
    environment:
      TZ: Europe/Paris
      LINKY_TOKEN: changeme
      LINKY_PRM: changeme
      HC_WINDOWS: "23:32-5:32,15:02-17:02"
      PRICE_HP: "0.2065"
      PRICE_HC: "0.1579"
      PRICE_ABO_MONTHLY: "15.65"
      REFRESH_INTERVAL: "3600"
      # Optional EcoFlow PowerStream solar production — leave empty to disable.
      ECOFLOW_EMAIL: ""
      ECOFLOW_PASSWORD: ""
      ECOFLOW_DEVICE_SN: ""
      ECOFLOW_API_HOST: api-e.ecoflow.com
      # Optional crypto-bot stats panel (top-right) — leave URL empty to disable.
      CRYPTO_API_URL: ""
      CRYPTO_API_TOKEN: ""
      # Optional cumulus (water-heater) daily consumption via Zigbee2MQTT —
      # leave host empty to disable. Use the broker's LAN IP (bridge network).
      CUMULUS_MQTT_HOST: ""
      CUMULUS_MQTT_PORT: "1883"
      CUMULUS_TOPIC: zigbee2mqtt/cumulus
      CUMULUS_MQTT_USERNAME: ""
      CUMULUS_MQTT_PASSWORD: ""
      # Optional UniFi network panel (bottom-right) — set the password to enable.
      # Use the gateway's LAN IP (bridge network can't use localhost).
      UNIFI_HOST: https://192.168.1.1
      UNIFI_USERNAME: ""
      UNIFI_PASSWORD: ""
      UNIFI_SITE: default
      UNIFI_SSID_IOT: your_iot_wifi_ssid
      UNIFI_SSID_MAIN: your_main_wifi_ssid
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://localhost:5000/status')" || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    network_mode: bridge
    labels:
      icon: https://raw.githubusercontent.com/moifort/dashboard/main/docs/preview.png

x-casaos:
  author: moifort
  category: Utilities
  icon: https://raw.githubusercontent.com/moifort/dashboard/main/docs/preview.png
  index: /
  port_map: "5000"
  scheme: http
  store_app_id: linky-dashboard
  title:
    en_us: Linky Dashboard
