name: linky-dashboard

services:
  linky-dashboard:
    build: .
    container_name: linky-dashboard
    restart: unless-stopped
    ports:
      - target: 5000
        published: "5000"
        protocol: tcp
    volumes:
      - type: volume
        source: linky-data
        target: /data
    environment:
      TZ: Europe/Paris
      LINKY_TOKEN: ${LINKY_TOKEN}
      LINKY_PRM: ${LINKY_PRM}
      HC_WINDOWS: ${HC_WINDOWS:-23:32-5:32,15:02-17:02}
      PRICE_HP: ${PRICE_HP:-0.2065}
      PRICE_HC: ${PRICE_HC:-0.1579}
      PRICE_ABO_MONTHLY: ${PRICE_ABO_MONTHLY:-15.65}
      REFRESH_INTERVAL: ${REFRESH_INTERVAL:-3600}

volumes:
  linky-data:

x-casaos:
  architectures:
    - amd64
    - arm64
  main: linky-dashboard
  store_app_id: linky-dashboard
  title:
    en_us: Linky Dashboard
    fr_fr: Dashboard Linky
  description:
    en_us: E-paper electricity consumption dashboard for Linky smart meters. Displays daily HC/HP breakdown with cost tracking.
    fr_fr: Dashboard e-paper de consommation electrique Linky. Affiche la repartition HC/HP journaliere avec suivi des couts.
  tagline:
    en_us: Electricity consumption on e-paper
    fr_fr: Consommation electrique sur e-paper
  icon: https://raw.githubusercontent.com/moifort/dashboard/main/linky-server/docs/preview.png
  category: Utility
  port_map: "5000"
  scheme: http
  developer: moifort
