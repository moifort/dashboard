<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1360px;
    height: 480px;
    overflow: hidden;
    background: #fff;
    color: #000;
    font-family: 'Courier New', monospace;
    -webkit-font-smoothing: none;
  }

  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 16px 40px 12px;
  }

  .title {
    font-size: 18px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 8px;
  }

  .chart-area {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 24px;
    padding-bottom: 0;
  }

  .day-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 120px;
  }

  .bar-value {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #000;
  }

  .bar-stack {
    width: 64px;
    display: flex;
    flex-direction: column;
  }

  .bar-hp {
    background: #000;
    width: 100%;
  }

  .bar-hc {
    background: #fff;
    border: 2px solid #000;
    width: 100%;
  }

  .day-label {
    font-size: 14px;
    color: #000;
    margin-top: 6px;
    font-weight: 700;
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 10px;
    font-size: 13px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-box {
    width: 16px;
    height: 16px;
    display: inline-block;
  }

  .legend-hp {
    background: #000;
  }

  .legend-hc {
    background: #fff;
    border: 2px solid #000;
  }

  .no-data {
    border: 2px dashed #000;
    background: #fff;
    width: 100%;
  }
</style>
</head>
<body>
<script>
  window.__DASHBOARD_DATA__ = {};
</script>

<div class="container">
  <div class="title" id="title">Consommation 7 jours</div>
  <div class="chart-area" id="chart"></div>
  <div class="legend">
    <div class="legend-item">
      <span class="legend-box legend-hp"></span>
      <span>HP (Heures Pleines)</span>
    </div>
    <div class="legend-item">
      <span class="legend-box legend-hc"></span>
      <span>HC (Heures Creuses)</span>
    </div>
  </div>
</div>

<script>
  var data = window.__DASHBOARD_DATA__;
  var days = data.days || [];
  var chart = document.getElementById('chart');
  var barMaxHeight = 320;

  if (days.length === 0) {
    chart.innerHTML = '<div style="font-size:24px;font-weight:700;color:#000">Aucune donnee disponible</div>';
    document.body.classList.add('ready');
  } else {
    var maxKwh = 0;
    days.forEach(function(d) {
      var total = (d.hc_kwh || 0) + (d.hp_kwh || 0);
      if (total > maxKwh) maxKwh = total;
    });
    if (maxKwh === 0) maxKwh = 1;

    days.forEach(function(d) {
      var hc = d.hc_kwh || 0;
      var hp = d.hp_kwh || 0;
      var total = hc + hp;
      var totalHeight = Math.round((total / maxKwh) * barMaxHeight);
      var hpHeight = Math.round((hp / maxKwh) * barMaxHeight);
      var hcHeight = totalHeight - hpHeight;
      var missing = total === 0;

      var col = document.createElement('div');
      col.className = 'day-col';

      var valueDiv = document.createElement('div');
      valueDiv.className = 'bar-value';
      valueDiv.textContent = missing ? '—' : total.toFixed(1);

      var stack = document.createElement('div');
      stack.className = 'bar-stack';

      if (missing) {
        var noData = document.createElement('div');
        noData.className = 'no-data';
        noData.style.height = '40px';
        stack.appendChild(noData);
      } else {
        if (hpHeight > 0) {
          var hpBar = document.createElement('div');
          hpBar.className = 'bar-hp';
          hpBar.style.height = hpHeight + 'px';
          stack.appendChild(hpBar);
        }
        if (hcHeight > 0) {
          var hcBar = document.createElement('div');
          hcBar.className = 'bar-hc';
          hcBar.style.height = hcHeight + 'px';
          stack.appendChild(hcBar);
        }
      }

      var label = document.createElement('div');
      label.className = 'day-label';
      label.textContent = d.day || '';

      col.appendChild(valueDiv);
      col.appendChild(stack);
      col.appendChild(label);
      chart.appendChild(col);
    });

    document.body.classList.add('ready');
  }
</script>
</body>
</html>
