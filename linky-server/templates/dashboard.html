<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1360px;
    height: 480px;
    overflow: hidden;
    background: #fff;
    color: #000;
    font-family: Arial, Helvetica, sans-serif;
    -webkit-font-smoothing: none;
  }

  .chart {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    position: absolute;
    bottom: 12px;
    left: 20px;
  }

  .day-col {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .bar-stack {
    width: 28px;
    display: flex;
    flex-direction: column;
    border-radius: 0;
    overflow: hidden;
  }

  .bar-hp {
    background: #000;
    width: 100%;
  }

  .bar-hc {
    background: #fff;
    border-top: 2px solid #000;
    border-bottom: 2px solid #000;
    width: 100%;
  }

  .bar-value {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #000;
    font-variant-numeric: tabular-nums;
  }

  .stats {
    position: absolute;
    left: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    padding-bottom: 4px;
    border-bottom: 1px solid #000;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 3px;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  .stat-val {
    font-weight: 700;
  }

  .stat-pct {
    font-weight: 700;
  }

  .stat-pct-bad {
    color: #ff0000;
  }

  .day-label {
    font-size: 12px;
    color: #000;
    margin-top: 4px;
    white-space: nowrap;
    text-transform: lowercase;
  }
</style>
</head>
<body>
<script>
  window.__DASHBOARD_DATA__ = {};
</script>

<div class="stats" id="stats"></div>
<div class="chart" id="chart"></div>

<script>
  var data = window.__DASHBOARD_DATA__;
  var s = data.stats || {};
  var statsEl = document.getElementById('stats');

  function pctInfo(pct, invertBad) {
    if (pct === 0) return {text: '—', bad: false};
    var arrow = pct > 0 ? '▲' : '▼';
    var bad = invertBad ? pct > 0 : pct < 0;
    return {text: arrow + Math.abs(pct) + '%', bad: bad};
  }

  if (s.avg_kwh) {
    var items = [
      {val: s.avg_kwh + ' kWh/j', pct: pctInfo(s.avg_kwh_pct, true)},
      {val: 'HC ' + s.hc_ratio + '%', pct: pctInfo(s.hc_ratio_pct, false)},
      {val: s.avg_price + ' €/j', pct: pctInfo(s.avg_price_pct, true)}
    ];
    items.forEach(function(item) {
      var div = document.createElement('div');
      div.className = 'stat-item';
      var pctClass = 'stat-pct' + (item.pct.bad ? ' stat-pct-bad' : '');
      div.innerHTML = '<span class="stat-val">' + item.val + '</span> ' +
        '<span class="' + pctClass + '">' + item.pct.text + '</span>';
      statsEl.appendChild(div);
    });
  }

  var days = data.days || [];
  var chart = document.getElementById('chart');
  var barMaxHeight = 180;

  var maxKwh = 0;
  days.forEach(function(d) {
    var total = (d.hc_kwh || 0) + (d.hp_kwh || 0);
    if (total > maxKwh) maxKwh = total;
  });
  if (maxKwh === 0) maxKwh = 1;

  days.forEach(function(d) {
    var hc = d.hc_kwh || 0;
    var hp = d.hp_kwh || 0;
    var total = hc + hp;
    var totalHeight = Math.round((total / maxKwh) * barMaxHeight);
    var hpHeight = Math.round((hp / maxKwh) * barMaxHeight);
    var hcHeight = totalHeight - hpHeight;

    var col = document.createElement('div');
    col.className = 'day-col';

    var valueDiv = document.createElement('div');
    valueDiv.className = 'bar-value';
    valueDiv.textContent = total.toFixed(1);

    var stack = document.createElement('div');
    stack.className = 'bar-stack';
    stack.style.height = totalHeight + 'px';

    if (hcHeight > 0) {
      var hcBar = document.createElement('div');
      hcBar.className = 'bar-hc';
      hcBar.style.height = hcHeight + 'px';
      stack.appendChild(hcBar);
    }
    if (hpHeight > 0) {
      var hpBar = document.createElement('div');
      hpBar.className = 'bar-hp';
      hpBar.style.height = hpHeight + 'px';
      stack.appendChild(hpBar);
    }

    var label = document.createElement('div');
    label.className = 'day-label';
    label.textContent = d.day;

    col.appendChild(valueDiv);
    col.appendChild(stack);
    col.appendChild(label);
    chart.appendChild(col);
  });

  var chartRect = chart.getBoundingClientRect();
  statsEl.style.width = chartRect.width + 'px';
  statsEl.style.bottom = (480 - chartRect.top + 4) + 'px';

  document.body.classList.add('ready');
</script>
</body>
</html>
